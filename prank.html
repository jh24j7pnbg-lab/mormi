<!DOCTYPE html>
<html>
<head>
    <title>Прикол Ссылка</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .prank-link {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .prank-link:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.6);
        }

        .prank-link:active {
            transform: scale(0.98);
        }

        .info {
            color: #666;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Кликни на ссылку ниже 🎉</h1>
        <button class="prank-link" onclick="startPrank()">НАЖМИ СЮДА</button>
        <div class="info">
            <p>⚠️ Это безобидный прикол!</p>
            <p>Поделись ссылкой с друзьями 😄</p>
        </div>
    </div>

    <script>
        function startPrank() {
            // Открываем новое окно с полным контентом прикола
            const prankWindow = window.open('', 'prank', 'width=1200,height=800');
            
            prankWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>⚠️ СИСТЕМА ЗАБЛОКИРОВАНА ⚠️</title>
                    <style>
                        body {
                            margin: 0;
                            height: 100vh;
                            background: black;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            font-family: 'Courier New', monospace;
                            cursor: none;
                            overflow: hidden;
                        }

                        .container {
                            text-align: center;
                            padding: 20px;
                            border: 3px solid red;
                            background: #1a0000;
                            box-shadow: 0 0 50px red;
                            animation: borderPulse 0.5s infinite;
                        }

                        @keyframes borderPulse {
                            0% { box-shadow: 0 0 20px red; border-color: red; }
                            100% { box-shadow: 0 0 80px darkred; border-color: darkred; }
                        }

                        h1 {
                            color: red;
                            font-size: 48px;
                            margin: 0;
                            animation: shake 0.2s infinite;
                            text-shadow: 0 0 10px red;
                        }

                        @keyframes shake {
                            0% { transform: translate(1px, 1px); }
                            25% { transform: translate(-1px, -2px); }
                            50% { transform: translate(-2px, 1px); }
                            75% { transform: translate(1px, -1px); }
                            100% { transform: translate(1px, 2px); }
                        }

                        .warning {
                            color: #ff4444;
                            font-size: 28px;
                            margin: 30px 0;
                            font-weight: bold;
                        }

                        .countdown {
                            color: red;
                            font-size: 72px;
                            font-weight: bold;
                            margin: 20px;
                            font-family: monospace;
                            text-shadow: 0 0 20px red;
                        }

                        .message {
                            color: #ff6666;
                            font-size: 20px;
                            margin-top: 30px;
                            padding: 10px;
                            border-top: 1px solid red;
                        }

                        .blink {
                            animation: blink 0.8s infinite;
                        }

                        @keyframes blink {
                            0%, 100% { opacity: 1; }
                            50% { opacity: 0; }
                        }

                        .close-btn {
                            position: fixed;
                            top: 20px;
                            right: 20px;
                            background: #ff6666;
                            color: white;
                            border: none;
                            padding: 10px 20px;
                            border-radius: 5px;
                            cursor: pointer;
                            font-size: 16px;
                            z-index: 10000;
                        }

                        .close-btn:hover {
                            background: #ff4444;
                        }
                    </style>
                </head>
                <body>
                    <button class="close-btn" onclick="window.close()">ЗАКРЫТЬ</button>
                    
                    <div class="container">
                        <h1>⚠️ СИСТЕМА НАРУШЕНА ⚠️</h1>
                        <div class="warning">ДОСТУП К ВАШИМ ДАННЫМ ПОЛУЧЕН</div>
                        <div class="countdown" id="countdown">10</div>
                        <div class="warning blink">ВЫ НЕ СМОЖЕТЕ ЭТО ОСТАНОВИТЬ</div>
                        <div class="message">
                            <span id="typing"></span>
                        </div>
                    </div>

                    <script>
                        let timeLeft = 10;
                        const countdownEl = document.getElementById('countdown');

                        const timer = setInterval(() => {
                            timeLeft--;
                            countdownEl.textContent = timeLeft;
                            if (timeLeft <= 0) {
                                clearInterval(timer);
                                jumpscare();
                            }
                        }, 1000);

                        const text = "1:1 • ВСЁ ЗАПИСАНО • 1:1";
                        let i = 0;
                        const typingEl = document.getElementById('typing');
                        function typeWriter() {
                            if (i < text.length) {
                                typingEl.innerHTML += text.charAt(i);
                                i++;
                                setTimeout(typeWriter, 100);
                            }
                        }
                        typeWriter();

                        let soundPlayed = false;

                        function jumpscare() {
                            document.body.innerHTML = \`
                                <button class="close-btn" onclick="window.close()">ЗАКРЫТЬ</button>
                                <div style="
                                    position: fixed;
                                    top: 0;
                                    left: 0;
                                    width: 100%;
                                    height: 100%;
                                    background: black;
                                    display: flex;
                                    justify-content: center;
                                    align-items: center;
                                    z-index: 9999;
                                ">
                                    <div style="text-align: center; background: #110000; padding: 40px; border: 5px solid red;">
                                        <h1 style="color: red; font-size: 64px; animation: shake 0.1s infinite;">⚠️ ТЫ ДУМАЛ, ЭТО ШУТКА? ⚠️</h1>
                                        <p style="color: red; font-size: 32px; margin: 30px;">1:1</p>
                                        <p style="color: #ff6666; font-size: 24px;">😂 СОБСТВЕННО, ДА! 😂</p>
                                        <p style="color: #ff6666; font-size: 18px; margin-top: 50px;">Это был прикол! Теперь поделись ссылкой с друзьями 🤪</p>
                                    </div>
                                </div>
                                <style>
                                    @keyframes shake {
                                        0% { transform: translate(1px, 1px) rotate(0deg); }
                                        10% { transform: translate(-1px, -2px) rotate(-1deg); }
                                        20% { transform: translate(-3px, 0px) rotate(1deg); }
                                        30% { transform: translate(3px, 2px) rotate(0deg); }
                                        40% { transform: translate(1px, -1px) rotate(1deg); }
                                        50% { transform: translate(-1px, 2px) rotate(-1deg); }
                                        60% { transform: translate(-3px, 1px) rotate(0deg); }
                                        70% { transform: translate(3px, 1px) rotate(-1deg); }
                                        80% { transform: translate(-1px, -1px) rotate(1deg); }
                                        90% { transform: translate(1px, 2px) rotate(0deg); }
                                        100% { transform: translate(1px, -2px) rotate(-1deg); }
                                    }
                                    .close-btn {
                                        position: fixed;
                                        top: 20px;
                                        right: 20px;
                                        background: #ff6666;
                                        color: white;
                                        border: none;
                                        padding: 10px 20px;
                                        border-radius: 5px;
                                        cursor: pointer;
                                        font-size: 16px;
                                        z-index: 10000;
                                    }
                                    .close-btn:hover {
                                        background: #ff4444;
                                    }
                                </style>
                            \`;
                            soundPlayed = true;
                        }

                        document.body.addEventListener('click', () => {
                            if (!soundPlayed && timeLeft > 0) {
                                jumpscare();
                            }
                        });
                    </script>
                </body>
                </html>
            `);
        }
    </script>
</body>
</html>
