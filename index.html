<!DOCTYPE html>
<html>
<head>
    <title>⚠️ СИСТЕМА ЗАБЛОКИРОВАНА ⚠️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            cursor: none;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            border: 3px solid red;
            background: #1a0000;
            box-shadow: 0 0 50px red;
            animation: borderPulse 0.5s infinite;
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 0 20px red; border-color: red; }
            100% { box-shadow: 0 0 80px darkred; border-color: darkred; }
        }

        h1 {
            color: red;
            font-size: 48px;
            margin: 0;
            animation: shake 0.2s infinite;
            text-shadow: 0 0 10px red;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            25% { transform: translate(-1px, -2px); }
            50% { transform: translate(-2px, 1px); }
            75% { transform: translate(1px, -1px); }
            100% { transform: translate(1px, 2px); }
        }

        .warning {
            color: #ff4444;
            font-size: 28px;
            margin: 30px 0;
            font-weight: bold;
        }

        .countdown {
            color: red;
            font-size: 72px;
            font-weight: bold;
            margin: 20px;
            font-family: monospace;
            text-shadow: 0 0 20px red;
        }

        .message {
            color: #ff6666;
            font-size: 20px;
            margin-top: 30px;
            padding: 10px;
            border-top: 1px solid red;
        }

        .blink {
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ СИСТЕМА НАРУШЕНА ⚠️</h1>
        <div class="warning">ДОСТУП К ВАШИМ ДАННЫМ ПОЛУЧЕН</div>
        <div class="countdown" id="countdown">10</div>
        <div class="warning blink">ВЫ НЕ СМОЖЕТЕ ЭТО ОСТАНОВИТЬ</div>
        <div class="message">
            <span id="typing"></span>
        </div>
    </div>

    <script>
        // Таймер
        let timeLeft = 10;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                jumpscare();
            }
        }, 1000);

        // Эффект печатающегося текста
        const text = "1:1 • ВСЁ ЗАПИСАНО • 1:1";
        let i = 0;
        const typingEl = document.getElementById('typing');
        function typeWriter() {
            if (i < text.length) {
                typingEl.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        typeWriter();

        // ГРОМКИЙ ЗВУК (только после клика — из-за политики браузера)
        let soundPlayed = false;
        const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        // Запасной звук (короткий крик) — если первый не загрузится
        const scream = new Audio('https://www.soundjay.com/misc/sounds/scream-01.mp3');

        function jumpscare() {
            // Меняем содержимое страницы на скример
            document.body.innerHTML = `
                <div style="
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: black;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999;
                ">
                    <div style="text-align: center; background: #110000; padding: 40px; border: 5px solid red;">
                        <h1 style="color: red; font-size: 64px; animation: shake 0.1s infinite;">⚠️ ТЫ ДУМАЛ, ЭТО ШУТКА? ⚠️</h1>
                        <p style="color: red; font-size: 32px; margin: 30px;">1:1</p>
                        <p style="color: #ff6666; font-size: 24px;">Я ЗНАЮ, ГДЕ ТЫ ЖИВЁШЬ</p>
                        <p style="color: #ff6666; font-size: 18px; margin-top: 50px;">Это была последняя ошибка, которую ты совершил.</p>
                    </div>
                </div>
                <style>
                    @keyframes shake {
                        0% { transform: translate(1px, 1px) rotate(0deg); }
                        10% { transform: translate(-1px, -2px) rotate(-1deg); }
                        20% { transform: translate(-3px, 0px) rotate(1deg); }
                        30% { transform: translate(3px, 2px) rotate(0deg); }
                        40% { transform: translate(1px, -1px) rotate(1deg); }
                        50% { transform: translate(-1px, 2px) rotate(-1deg); }
                        60% { transform: translate(-3px, 1px) rotate(0deg); }
                        70% { transform: translate(3px, 1px) rotate(-1deg); }
                        80% { transform: translate(-1px, -1px) rotate(1deg); }
                        90% { transform: translate(1px, 2px) rotate(0deg); }
                        100% { transform: translate(1px, -2px) rotate(-1deg); }
                    }
                </style>
            `;

            // Пытаемся проиграть звук
            audio.play().catch(() => scream.play().catch(e => console.log('Sound blocked')));
            soundPlayed = true;

            // Вибрация (если телефон поддерживает)
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 500]);
            }
        }

        // Если пользователь кликнет до окончания таймера — всё равно скример
        document.body.addEventListener('click', () => {
            if (!soundPlayed && timeLeft > 0) {
                jumpscare();
            }
        });
    </script>
</body>
</html>
